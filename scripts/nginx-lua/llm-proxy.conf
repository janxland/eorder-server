# Nginx 配置：LLM 反代网关
#
# 流程：
#   浏览器 → xqjn.top/llm/v1/chat/completions
#       ↓
#   Lua 鉴权 (JWT 验证 + 域名会话缓存)
#       ↓
#   代理到 edu.roginx.ink/api/llm/v1/chat/completions
#       ↓
#   eorder-server 调用实际 LLM 服务商
#
# 架构说明：
#   - xqjn.top: 强大服务器，做鉴权和路由
#   - edu.roginx.ink: 弱服务器，运行 eorder-server

# ================================================================
# /llm/ LLM 反代网关
# ================================================================
location ^~ /llm/ {
    # Lua 鉴权（JWT 验证 + 域名会话缓存）
    access_by_lua_file /www/server/panel/vhost/nginx/lua/xqjn-llm-auth.lua;

    set $cors_origin "*";

    # CORS 响应头
    add_header Access-Control-Allow-Origin $cors_origin always;
    add_header Access-Control-Allow-Methods "GET,POST,OPTIONS" always;
    add_header Access-Control-Allow-Headers
        "Content-Type,Authorization,X-Proxy-Key,X-Proxy-Target,X-Proxy-Model,X-Session-Token"
        always;
    add_header Access-Control-Allow-Credentials "true" always;
    add_header Access-Control-Max-Age "86400" always;

    # 反代配置
    proxy_http_version 1.1;
    proxy_set_header Host            $http_host;
    proxy_set_header X-Real-IP       $remote_addr;
    proxy_set_header X-Forwarded-For  $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Content-Type    $http_content_type;
    proxy_set_header Cookie          "";
    proxy_set_header Connection      "";

    # 保留原始请求头
    proxy_pass_header Authorization;
    proxy_pass_header X-Proxy-Key;
    proxy_pass_header X-Proxy-Target;

    # 超时配置
    proxy_connect_timeout 10s;
    proxy_send_timeout    60s;
    proxy_read_timeout   120s;

    # 禁用缓冲（流式响应）
    proxy_buffering      off;
    proxy_cache          off;

    # 代理到 edu.roginx.ink/api/llm/（路径已在 Lua 中拼接完整）
    # 注意：proxy_pass 带 URI 时，nginx 会用 $uri 替换 location 前缀
    # /llm/v1/chat/completions → /api/llm/v1/chat/completions
    proxy_pass http://edu.roginx.ink/api/llm/;
}
